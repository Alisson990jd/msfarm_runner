name: Windows RDP via Ngrok

on:
  workflow_dispatch:

jobs:
  windows-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      # ── 1. Criar senha e habilitar o RDP ──────────────────────────
      - name: Habilitar RDP e definir credenciais
        run: |
          # Define senha para o usuário padrão do runner
          Set-LocalUser -Name "runneradmin" `
            -Password (ConvertTo-SecureString -AsPlainText "P@ssw0rd!123" -Force)

          # Habilita conexões de Área de Trabalho Remota
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0

          # Libera firewall para RDP
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Habilita autenticação NLA
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 1

          Write-Host "✅ RDP habilitado com sucesso"

      # ── 2. Baixar e configurar o Ngrok ─────────────────────────────
      - name: Instalar Ngrok
        run: |
          Invoke-WebRequest `
            -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" `
            -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath "$env:USERPROFILE\ngrok"
          Write-Host "✅ Ngrok instalado"

      - name: Autenticar Ngrok
        run: |
          & "$env:USERPROFILE\ngrok\ngrok.exe" config add-authtoken 1vgZrCA9yJDURy3OK1gNbS2G610_3CX2e2bqT4Ee88uMBk5he

      # ── 3. Iniciar túnel TCP na porta 3389 (RDP) ──────────────────
      - name: Iniciar túnel Ngrok
        run: |
          Start-Process -FilePath "$env:USERPROFILE\ngrok\ngrok.exe" `
            -ArgumentList "tcp 3389" -WindowStyle Hidden

          # Aguarda o túnel subir
          Start-Sleep -Seconds 10

          # Consulta a API local do Ngrok para obter o endereço público
          $tunnels = (Invoke-RestMethod http://127.0.0.1:4040/api/tunnels).tunnels
          $publicUrl = $tunnels[0].public_url

          Write-Host ""
          Write-Host "==========================================="
          Write-Host "  🖥️  CONEXÃO RDP PRONTA"
          Write-Host "==========================================="
          Write-Host "  Endereço : $publicUrl"
          Write-Host "  Usuário  : runneradmin"
          Write-Host "  Senha    : P@ssw0rd!123"
          Write-Host "==========================================="
          Write-Host ""
          Write-Host "Abra o 'Conexão de Área de Trabalho Remota'"
          Write-Host "e cole o endereço acima (sem tcp://)."
          Write-Host ""

      # ── 4. Manter a sessão viva ────────────────────────────────────
      - name: Manter sessão ativa (max 6h)
        run: |
          $start = Get-Date
          while ((Get-Date) -lt $start.AddHours(6)) {
            # Re-exibe o endereço a cada 5 min (útil se precisar rolar o log)
            try {
              $tunnels = (Invoke-RestMethod http://127.0.0.1:4040/api/tunnels).tunnels
              $url = $tunnels[0].public_url
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Sessão ativa — RDP em: $url"
            } catch {
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Sessão ativa..."
            }
            Start-Sleep -Seconds 300
          }
